<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omniverse 5000: Data Architect</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hyperformula/dist/hyperformula.full.min.js"></script>
</head>
<body>

  <nav class="top-bar glass">
    <button class="menu-btn" onclick="openSidebar()">☰ Menu</button>
    <div class="top-level-indicator" id="topLevelText">TITAN ENGINE</div>
  </nav>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-header">
      <h1>Omniverse 5000</h1>
      <button class="close-btn" onclick="closeSidebar()">×</button>
    </div>
    
    <div class="tracker-box">
      <h3>Rekor Tertinggi</h3>
      <div class="val" id="highestLevelDisplay">0</div>
      <button class="btn-resume" onclick="resumeJourney()">Lanjutkan Rekor</button>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Ganti Tema Tampilan</button>
    
    <div class="search-container">
      <input type="text" id="searchInput" class="search-box" placeholder="Ketik level (cth: 2000)..." oninput="handleTyping(event)" onkeydown="handleEnterKey(event)">
      <button class="btn-search" onclick="executeExactSearch()">Cari</button>
    </div>

    <div class="toc-list" id="tocList"></div>
  </aside>

  <div class="app-wrapper">
    <main class="book-container glass" id="bookContainer">
      <section class="page" id="theoryPage"><h2>Inisialisasi Sistem...</h2></section>
      <section class="page" id="practicePage"></section>
    </main>
  </div>

  <script src="./narrative.js"></script>
  <script src="./engine.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('ServiceWorker Aktif!', reg.scope))
          .catch(err => console.error('Gagal ServiceWorker', err));
      });
    }
  </script>
</body>
</html>
